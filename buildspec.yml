version: 0.2

env:
  variables:
    ENV_VARS_LIST: "REACT_APP_BACKEND_URL REACT_APP_GEOSERVER_URL REACT_APP_BACKEND_KEY REACT_APP_ENVIRONMENT REACT_APP_API_KEY REACT_APP_DOMAIN REACT_APP_PROJECT_ID REACT_APP_STORAGE_BUCKET REACT_APP_SENDER_ID REACT_APP_APP_ID REACT_APP_BACKEND_BIAB_URL REACT_APP_GA_TRACKING_ID REACT_APP_YM_ID"

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin 005235113454.dkr.ecr.us-east-1.amazonaws.com
      - REPOSITORY_URI=005235113454.dkr.ecr.us-east-1.amazonaws.com/biotablero/frontend
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - rm -f .env
      - touch .env
      - chmod 600 .env
      - |
        for var in $ENV_VARS_LIST; do
          echo "$var=${!var}" >> .env
        done
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
      - echo Build completed on `date`
      - echo Pushing the Docker images...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Writing image definitions file...
      - printf '[{"name":"biotablero-frontend","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
  post_build:
    commands:
      - echo "Assuming cross account role..."
      - echo deploy image $REPOSITORY_URI:$IMAGE_TAG
      - CREDS=$(aws sts assume-role --role-arn arn:aws:iam::005235113454:role/CodeBuildDeployECSRole --role-session-name codebuild-deploy --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)
      - export AWS_ACCESS_KEY_ID=$(echo $CREDS | awk '{print $1}')
      - export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | awk '{print $2}')
      - export AWS_SESSION_TOKEN=$(echo $CREDS | awk '{print $3}')
      - echo "Deploying to ECS..."
      - aws ecs update-service --cluster arn:aws:ecs:us-east-1:005235113454:cluster/humbolt-cluster-dev  --service biotablero-frontend  --force-new-deployment
artifacts:
    files: imagedefinitions.json